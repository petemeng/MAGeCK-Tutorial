site_name: MAGeCK CRISPR Screen Tutorial
site_description: Best-practice MAGeCK tutorial with reproducible CRISPR screen workflows
site_author: petemeng
repo_url: https://github.com/petemeng/MAGeCK-Tutorial
edit_uri: edit/main/docs/

theme:
  name: material
  language: zh
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - 教程系列:
      - 1. 基础流程：从计数到必需基因: 01-basic-mageck.md
      - 2. MLE 与 VISPR: 02-mle-vispr.md
      - 3. MAGeCKFlute 整合分析: 03-flute-integrative.md
      - 4. CRISPRi / CRISPRa: 04-crispri-crispra.md
      - 5. 药物互作与合成致死: 05-drug-interaction.md
      - 6. 投稿图表与审稿问答: 06-publication-figures.md
